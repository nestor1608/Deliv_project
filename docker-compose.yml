version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: deliv_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_replica:
    image: postgres:15
    environment:
      POSTGRES_DB: deliv_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    command: |
      postgres -c hot_standby=on
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - replica

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "100"
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - pgbouncer

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis-sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - sentinel

volumes:
  pgdata:
  redisdata:
