[tool.black]
line-length = 100
target-version = ['py311']
extend-exclude = '''
/(
    migrations/
  | venv/
  | .pytest_cache/
  | .git/
  | graphify-out/
)
'''

[tool.isort]
profile = "black"
line_length = 100
skip = ["migrations", "venv", ".pytest_cache", ".git", "graphify-out"]
skip_gitignore = true
